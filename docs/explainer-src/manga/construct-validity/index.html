; 29 expert reviewers.\n- ~47.8% of phenomenon definitions are *contested* → \"~48% of definitions contested\" (pages 4).\n- 61.2% treat the phenomenon as a composite but don't measure sub-parts separately → page 2/4 \"more than one thing in the crate.\"\n- 40.7% use constructed (not real-world) tasks; 27% convenience sampling; 42.6% reuse data without checking representativeness → page 3 \"stand-in\" / page 5 cards 3–4.\n- 81.3% rely on exact-match scoring → \"81%\" (pages 3–4).\n- Only ~16% use any statistical testing / uncertainty → \"16% report uncertainty\" (page 4) and the error-band gauge (pages 5–6).\n- 53.4% give no explicit validity justification → \"half never justified the number\" (page 4); recommendation 8 (page 5).\n\n## The eight recommendations (paper → index cards on page 5)\n1. Define the phenomenon (precise, operational definition).\n2. Measure only the phenomenon (control confounding abilities).\n3. Construct representative datasets (sample the real task space).\n4. Acknowledge dataset-reuse limitations (document strengths/weaknesses).\n5. Prepare for contamination (test for and detect leakage).\n6. Use statistical methods (report uncertainty for all primary scores).\n7. Conduct error analysis (qualitative + quantitative failure modes).\n8. Justify construct validity (tie the benchmark to real-world relevance).\n\n## Metaphor decisions\n- Benchmark → lobby weighing scale; keeps the \"one confident number\" feel and lets page 6 mirror page 1.\n- Phenomenon → sealed stenciled crate; \"safety/robustness\" as a word nobody opened.\n- Construct validity → steel tape measure literally touching (or not touching) the thing.\n- Exact-match → bubble-sheet grader; contamination → answer key left in the room; uncertainty → gauge needle with/without an error band.\n- Eight recommendations → eight plain index cards, deliberately un-flashy.\n\n## Omitted / could expand in a sequel\n- The reviewer methodology and inter-rater process (how 29 people agree).\n- Th ry graphic-novel art in the vein of understated ligne-claire indie /\nalternative comics and New Yorker cover illustration.\nClean ligne-claire linework, thin even ink weight, restrained and precise.\nFlat muted color palette: dusty blues, ochre, olive, warm gray; soft print-like tones,\nno glossy rendering, no gradients, slight risograph texture.\nNaturalistic adult proportions and understated faces; quiet, deadpan, melancholic.\nUrban realism — offices, laptops, fluorescent light, late-evening windows.\nDry, ironic, observational comedy. Comedy comes from composition and silence, not\nexaggeration.\nNot manga chibi. Not cute. Not shonen. Not glossy 3D. Not action lines.\nLettering: clean typeset caption boxes and small naturalistic speech balloons,\nNew-Yorker-style dry captions.\n\nCharacters in this page:\nDana — 34, black bob with blunt bangs, round wire glasses, faint permanent frown, oversized olive cardigan over a plain tee, holding a chipped ceramic mug.\nTheo — 38, shaved head, stubble, faded blue work jacket over a gray hoodie.\n\nSetting:\nA cramped windowless back room behind the warehouse — the grading room. A bulky bubble-sheet (scantron) grading machine, a wall gauge with a single needle, a metal exam desk.\n\nPanel 1:\nEstablishing shot of the grading machine chewing through stacks of bubble sheets. A handwritten sticky note on it: \"81% — EXACT MATCH ONLY.\" Caption box: \"Most tests check one thing: did the bubble line up. Not whether the answer made sense.\"\n\nPanel 2:\nClose on a bubble sheet: a thoughtful, correct hand-written answer in the margin, marked WRONG because it didn't match the key's exact wording. Dana frowns over it, mug halfway up. Balloon (Dana): \"It's right. It's just not identical.\"\n\nPanel 3:\nTheo points at a wall gauge — a single needle, no error bars, no shaded band of uncertainty. A small plate under it: \"ONLY 16% REPORT UNCERTAINTY.\" Balloon (Theo): \"One needle, no wobble. They never say how sure they are.\"\n\nPanel 4:\nTwo crates side by side, both stenciled \"HARMLESSNESS\", each with a different definition tag (echo of page 2). A tally chalk mark on the wall: \"~48% OF DEFINITIONS CONTESTED.\" Caption box: \"Same word. Two meanings. Averaged into one score.\"\n\nPanel 5:\nOn the exam desk, an answer key lies face-up next to the blank test — the answer key left in the room. Caption box (deadpan): \"And sometimes the model already saw the answers. Contamination. The exam, taken open-book, reported as closed.\"\n\nPanel 6:\nPull back: Dana and Theo standing in the small room, the machine still running behind them. Balloon (Dana, flat): \"So the impressive number is...\" Theo, not unkind: \"Real. Just not about what you think.\" Caption box: \"Half the tests never justified that their number meant anything at all.\"\n\nLettering:\nLeave room for English dialogue and captions. Keep text areas clear.\n\nOutput:\nA single finished manga page.", "prompt": "Create a six-panel educational manga page.\n\nStyle:\nModern literary graphic-novel art in the vein of understated ligne-claire indie /\nalternative comics and New Yorker cover illustration.\nClean ligne-claire linework, thin even ink weight, restrained and precise.\nFlat muted color palette: dusty blues, ochre, olive, warm gray; soft print-like tones,\nno glossy rendering, no gradients, slight risograph texture.\nNaturalistic adult proportions and understated faces; quiet, deadpan, melancholic.\nUrban realism — offices, laptops, fluorescent light, late-evening windows.\nDry, ironic, observational comedy. Comedy comes from composition and silence, not\nexaggeration.\nNot manga chibi. Not cute. Not shonen. Not glossy 3D. Not action lines.\nLettering: clean typeset caption boxes and small naturalistic speech balloons,\nNew-Yorker-style dry captions.\n\nCharacters in this page:\nDana — 34, black bob with blunt bangs, round wire glasses, faint permanent frown, oversized olive cardigan over a plain tee, holding a chipped ceramic mug <script>
const DATA = JSON.parse(document.getElementById("manga-data").textContent);
const $ = (s, el=document) => el.querySelector(s);

function toast(msg) {
  const t = $("#toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove("show"), 1400);
}
async function copy(text, btn) {
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
    } else {
      const ta = document.createElement("textarea");
      ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta); ta.select();
      document.execCommand("copy"); ta.remove();
    }
    if (btn) { const old = btn.textContent; btn.textContent = "Copied ✓";
      btn.classList.add("copied");
      setTimeout(() => { btn.textContent = old; btn.classList.remove("copied"); }, 1200); }
    toast("Copied to clipboard");
  } catch (e) { toast("Copy failed — select the text manually"); }
}
function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

function card(item) {
  const el = document.createElement("div");
  el.className = "card";
  const btns = [];
  if (item.kind === "page") {
    btns.push(`<button class="primary" data-copy="prompt">Copy prompt</button>`);
    btns.push(`<button data-copy="full">Copy full page</button>`);
  } else {
    btns.push(`<button class="primary" data-copy="full">Copy</button>`);
  }
  el.innerHTML = `
    <div class="card-head">
      <div>
        <h2>${esc(item.title)}</h2>
        ${item.purpose ? `<p class="purpose">${esc(item.purpose)}</p>` : ""}
      </div>
      <div class="btns">${btns.join("")}</div>
    </div>
    ${item.image ? `<img class="panel" src="${esc(item.image)}" alt="">` : ""}
    <details>
      <summary>Show text</summary>
      <pre>${esc(item.kind === "page" ? item.prompt : item.full)}</pre>
    </details>`;
  el.querySelectorAll("button[data-copy]").forEach(b => {
    b.addEventListener("click", () => {
      const which = b.dataset.copy;
      copy(which === "prompt" ? item.prompt : item.full, b);
    });
  });
  return el;
}

// header
$("#title").textContent = DATA.title || "Manga prompt deck";
const meta = [];
if (DATA.source) meta.push(DATA.source);
if (DATA.audience) meta.push("Audience: " + DATA.audience);
meta.push(`${DATA.pages.length} pages`);
$("#meta").textContent = meta.join("  ·  ");

// docs (manifest / character sheet / notes)
const docsEl = $("#docs");
DATA.sections.forEach(s => docsEl.appendChild(card(s)));

// pages
const pagesEl = $("#pages");
if (DATA.pages.length) $("#pagesLabel").hidden = false;
DATA.pages.forEach(p => pagesEl.appendChild(card(p)));

// toolbar
$("#copyAll").addEventListener("click", (e) => {
  const all = DATA.pages.map(p => `### ${p.title}\n\n${p.prompt}`).join("\n\n---\n\n");
  copy(all, e.currentTarget);
});
$("#expandAll").addEventListener("click", () =>
  document.querySelectorAll("details").forEach(d => d.open = true));
$("#collapseAll").addEventListener("click", () =>
  document.querySelectorAll("details").forEach(d => d.open = false));
</script>
</body>
</html>
